[LAB]
name = City Diagnostic Laboratory
phone = +92-300-1234567
address = Main Boulevard, Lahore, Pakistan
email = info@citydiagnostics.pk

[APP]
auto_start_listeners = yes
start_minimized = no

[DATABASE]
# Our app database (results, reports)
path = lab_data.db

# Client's existing database (read patient data from here)
# Supported: sqlite, mysql, postgresql, mssql (SQL Server), access
[CLIENT_DB]
enabled = no
type = mysql
host = localhost
port = 3306
name = hospital_db
user = root
password =
# SQL query to read patients from client's database
# Adjust column names to match their table structure
patient_query = SELECT id as mrn, patient_name as name, gender, date_of_birth as dob, phone FROM patients
# How often to sync (minutes). 0 = manual only
sync_interval = 5

[MACHINE_1]
name = Hematology Analyzer
port = COM3
baud_rate = 9600
enabled = yes

[MACHINE_2]
name = Chemistry Analyzer
port = COM4
baud_rate = 9600
enabled = no

[MACHINE_3]
name = Immunoassay Analyzer
port = COM5
baud_rate = 9600
enabled = no

[REPORT]
output_folder = reports
show_qr = yes
logo_path =
